<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 320px; padding: 15px; font-family: sans-serif; }
        input, select { width: 100%; padding: 8px; margin: 6px 0 12px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;}
        .btn-save { background: #4CAF50; }
        .btn-save:hover { background: #45a049; }
        .btn-draw { background: #2196F3; margin-top: 15px; }
        .btn-draw:hover { background: #1976D2; }
        .btn-shortcut { background: #FF9800; margin-top: 10px; }
        .btn-shortcut:hover { background: #F57C00; }
        label { font-size: 13px; font-weight: bold; color: #333; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
        .help-text { font-size: 11px; color: #666; background: #f5f5f5; padding: 8px; border-radius: 4px; margin-bottom: 10px;}
    </style>
</head>
<body>
<h3>⚙️ WordMap 通用 AI 设置</h3>

<div class="help-text">
    支持任何兼容 OpenAI 格式的 API。<br>
    <b>Ollama 本地:</b> 地址填 http://localhost:11434/v1<br>
    <b>Groq:</b> 地址填 https://api.groq.com/openai/v1
</div>

<label>1. 接口地址 (Base URL):</label>
<input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">

<label>2. 模型名称 (Model Name):</label>
<input type="text" id="modelName" placeholder="例如: llama-3.3-70b-versatile">

<label>3. API Key (本地 Ollama 可留空):</label>
<input type="password" id="apiKey" placeholder="sk-...">

<label>4. 翻译目标语言:</label>
<select id="targetLang">
    <option value="Chinese">中文 (Chinese)</option>
    <option value="English">英文 (English)</option>
    <option value="Japanese">日文 (Japanese)</option>
</select>

<button id="saveBtn" class="btn-save">保存配置</button>
<p id="status" style="color: green; display: none; font-size: 12px; margin-top:5px;">✅ 保存成功！</p>

<hr>

<label>快速操作:</label>
<button id="drawBtn" class="btn-draw">🖍️ 抠图翻译</button>
<button id="shortcutBtn" class="btn-shortcut">⌨️ 自定义快捷键</button>

<script src="popup.js"></script>
</body>
</html>
