<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordMap</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<main class="popup-shell">
    <header class="topbar">
        <div class="brand">
            <img class="brand-logo" src="assets/logo.svg" alt="WordMap logo">
            <div class="brand-copy">
                <h1 class="brand-title" data-i18n="appTitleCompact"></h1>
                <p class="brand-subtitle" data-i18n="appSubtitleCompact"></p>
            </div>
        </div>

        <button id="uiLangToggle" class="lang-toggle" type="button">
            <span class="lang-toggle-icon">🌐</span>
            <span id="uiLangToggleText" class="lang-toggle-text">EN</span>
        </button>
    </header>

    <section class="panel panel--actions">
        <div class="section-head section-head--compact">
            <div>
                <h2 data-i18n="sectionActionTitle"></h2>
                <p data-i18n="sectionActionDescCompact"></p>
            </div>
            <button id="shortcutBtn" class="shortcut-chip" type="button" data-i18n="openShortcutsShort"></button>
        </div>

        <div class="tool-row">
            <button id="drawPencilBtn" class="tool-btn" type="button">
                <span class="tool-icon tool-icon--blue" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 20l3.2-.8 9.9-9.9a2.4 2.4 0 0 0-3.4-3.4L3.8 15.8 3 19z"></path>
                        <path d="M12.6 6.9l4.5 4.5"></path>
                        <path d="M14 20h6"></path>
                    </svg>
                </span>
                <span class="tool-copy">
                    <span class="tool-label" data-i18n="drawPencilLabel"></span>
                    <span class="tool-desc" data-i18n="drawPencilDescShort"></span>
                </span>
            </button>

            <button id="drawRectBtn" class="tool-btn" type="button">
                <span class="tool-icon tool-icon--purple" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4.5" y="6" width="15" height="12" rx="2.5"></rect>
                        <path d="M8 10h8"></path>
                        <path d="M8 14h5"></path>
                    </svg>
                </span>
                <span class="tool-copy">
                    <span class="tool-label" data-i18n="drawRectLabel"></span>
                    <span class="tool-desc" data-i18n="drawRectDescShort"></span>
                </span>
            </button>
        </div>

        <p class="tool-note" data-i18n="actionHintCompact"></p>
    </section>

    <section class="panel">
        <div class="section-head">
            <div>
                <h2 data-i18n="sectionLanguageTitle"></h2>
                <p data-i18n="sectionLanguageDescCompact"></p>
            </div>
            <div class="mini-badge" data-i18n="ocrUiSeparatedBadge"></div>
        </div>

        <div class="field-grid field-grid--2">
            <div class="field-group">
                <label for="sourceLang" data-i18n="sourceLangLabel"></label>
                <select id="sourceLang"></select>
            </div>
            <div class="field-group">
                <label for="targetLang" data-i18n="targetLangLabel"></label>
                <select id="targetLang"></select>
            </div>
        </div>

        <p class="helper-inline" data-i18n="sourceLangHintCompact"></p>
    </section>

    <section class="panel">
        <div class="section-head">
            <div>
                <h2 data-i18n="sectionConnectionTitle"></h2>
                <p data-i18n="sectionConnectionDescCompact"></p>
            </div>
            <a href="https://ocr.space/OCRAPI" target="_blank" rel="noreferrer" class="mini-link" data-i18n="ocrKeyHelpLinkShort"></a>
        </div>

        <div class="field-grid">
            <div class="field-group field-group--full">
                <label for="apiBaseUrl" data-i18n="apiBaseUrlLabel"></label>
                <input type="text" id="apiBaseUrl" data-i18n-placeholder="apiBaseUrlPlaceholder" autocomplete="off" spellcheck="false">
            </div>

            <div class="field-group">
                <label for="modelName" data-i18n="modelNameLabel"></label>
                <input type="text" id="modelName" data-i18n-placeholder="modelNamePlaceholder" autocomplete="off" spellcheck="false">
            </div>

            <div class="field-group">
                <label for="ocrApiKey" data-i18n="ocrApiKeyLabel"></label>
                <input type="password" id="ocrApiKey" data-i18n-placeholder="ocrApiKeyPlaceholder">
            </div>

            <div class="field-group field-group--full">
                <label for="apiKey" data-i18n="apiKeyLabel"></label>
                <input type="password" id="apiKey" data-i18n-placeholder="apiKeyPlaceholder">
            </div>
        </div>

        <p class="helper-inline helper-inline--muted" data-i18n="ocrKeyHelpBodyCompact"></p>
    </section>

    <footer class="footer-bar">
        <button id="saveBtn" class="save-btn" type="button" data-i18n="saveSettings"></button>
        <span id="status" class="status-pill" hidden></span>
    </footer>
</main>

<script src="i18n.js"></script>
<script src="popup.js"></script>
</body>
</html>
