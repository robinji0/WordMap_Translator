<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 320px; padding: 15px; font-family: sans-serif; }
        input, select { width: 100%; padding: 8px; margin: 6px 0 12px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;}
        .btn-save { background: #4CAF50; }
        .btn-save:hover { background: #45a049; }
        .btn-draw { background: #2196F3; flex: 1; }
        .btn-draw:hover { background: #1976D2; }
        .btn-rect { background: #9C27B0; flex: 1; }
        .btn-rect:hover { background: #7B1FA2; }
        .btn-shortcut { background: #FF9800; margin-top: 10px; }
        .btn-shortcut:hover { background: #F57C00; }
        label { font-size: 13px; font-weight: bold; color: #333; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
        .help-text { font-size: 11px; color: #666; background: #f5f5f5; padding: 8px; border-radius: 4px; margin-bottom: 10px;}
        .link { color: #2196F3; text-decoration: none; }
        .action-group { display: flex; gap: 10px; margin-top: 10px; }
        /* 新增赞助按钮样式 */
        .sponsor-container { text-align: center; margin-top: 15px; }
        .sponsor-link { color: #E91E63; text-decoration: none; font-size: 13px; font-weight: bold; padding: 5px 10px; border-radius: 15px; background: #fce4ec; transition: all 0.3s; display: inline-block; cursor: pointer; }
        .sponsor-link:hover { background: #f8bbd0; transform: scale(1.05); }
    </style>
</head>
<body>
<h3 data-i18n="title">⚙️ WordMap 通用设置</h3>

<div class="help-text" data-i18n="ocrHelp">
    <b>免费 OCR 引擎支持：</b><br>
    默认使用公共测试 Key，若报错频繁请 <a href="https://ocr.space/OCRAPI" target="_blank" class="link">点此免费申请专属 Key</a>
</div>

<label data-i18n="uiLangLabel">界面语言 (UI Language):</label>
<select id="uiLang">
    <option value="zh">简体中文 (Chinese)</option>
    <option value="en">English</option>
</select>

<label data-i18n="ocrKeyLabel">OCR.space API Key:</label>
<input type="password" id="ocrApiKey" data-i18n-placeholder="ocrKeyPlaceholder" placeholder="留空则使用默认 helloworld">

<label data-i18n="baseUrlLabel">大模型接口地址 (Base URL):</label>
<input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">

<label data-i18n="modelNameLabel">大模型名称 (纯文本模型):</label>
<input type="text" id="modelName" data-i18n-placeholder="modelNamePlaceholder" placeholder="例如: llama-3.3-70b-versatile">

<label data-i18n="apiKeyLabel">大模型 API Key:</label>
<input type="password" id="apiKey" placeholder="sk-...">

<label data-i18n="sourceLangLabel">你要抠的网页语言 (Source):</label>
<select id="sourceLang">
    <option value="eng">英语 (English)</option>
    <option value="jpn">日语 (Japanese)</option>
    <option value="kor">韩语 (Korean)</option>
    <option value="fre">法语 (French)</option>
    <option value="spa">西班牙语 (Spanish)</option>
    <option value="ger">德语 (German)</option>
    <option value="rus">俄语 (Russian)</option>
    <option value="chs">中文 (Chinese)</option>
</select>

<label data-i18n="targetLangLabel">翻译目标语言 (Target):</label>
<select id="targetLang">
    <option value="Chinese">中文 (Chinese)</option>
    <option value="English">英文 (English)</option>
    <option value="Japanese">日文 (Japanese)</option>
    <option value="Korean">韩文 (Korean)</option>
    <option value="French">法文 (French)</option>
    <option value="Spanish">西班牙文 (Spanish)</option>
    <option value="German">德文 (German)</option>
    <option value="Russian">俄文 (Russian)</option>
</select>

<button id="saveBtn" class="btn-save" data-i18n="saveBtn">保存配置</button>
<p id="status" style="color: green; display: none; font-size: 12px; margin-top:5px;" data-i18n="saveSuccess">✅ 保存成功！</p>

<hr>

<label data-i18n="quickActions">快速操作:</label>
<div class="action-group">
    <button id="drawPencilBtn" class="btn-draw" data-i18n="pencilBtn">🖍️ 铅笔画圈</button>
    <button id="drawRectBtn" class="btn-rect" data-i18n="rectBtn">🔲 矩形框选</button>
</div>
<button id="shortcutBtn" class="btn-shortcut" data-i18n="shortcutBtn">⌨️ 自定义快捷键</button>

<div class="sponsor-container">
    <a id="sponsorBtn" class="sponsor-link" data-i18n="sponsorBtn">☕ 赞助开发者 (Sponsor)</a>
</div>

<script src="popup.js"></script>
</body>
</html>
